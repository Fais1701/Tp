<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Dodger</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial; }
    canvas { display: block; }
    #score { position: absolute; top: 10px; left: 10px; font-size: 20px; }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="gameOver">
  <h1>Game Over</h1>
  <button onclick="restart()">Restart</button>
</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width / 2, y: canvas.height - 60, size: 20 };
let obstacles = [];
let speed = 3;
let score = 0;
let running = true;

function spawnObstacle() {
  obstacles.push({
    x: Math.random() * canvas.width,
    y: -20,
    size: 20
  });
}

function update() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = 'cyan';
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Obstacles
  ctx.fillStyle = 'red';
  obstacles.forEach((o, i) => {
    o.y += speed;
    ctx.fillRect(o.x, o.y, o.size, o.size);

    // Collision
    if (
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ) {
      gameOver();
    }

    if (o.y > canvas.height) {
      obstacles.splice(i, 1);
      score++;
      document.getElementById('score').innerText = 'Score: ' + score;
    }
  });

  requestAnimationFrame(update);
}

function gameOver() {
  running = false;
  document.getElementById('gameOver').style.display = 'block';
}

function restart() {
  obstacles = [];
  score = 0;
  speed = 3;
  running = true;
  document.getElementById('score').innerText = 'Score: 0';
  document.getElementById('gameOver').style.display = 'none';
  update();
}

// Controls
window.addEventListener('mousemove', (e) => {
  player.x = e.clientX;
});

// Mobile
window.addEventListener('touchmove', (e) => {
  player.x = e.touches[0].clientX;
});

setInterval(() => {
  if (running) spawnObstacle();
}, 800);

setInterval(() => {
  if (running) speed += 0.2;
}, 2000);

update();
</script></body>
</html>
